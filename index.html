<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quà tặng Chị Yêu ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="gift-screen">
        <div class="gift-box" onclick="goToAuth()">
            <div class="gift-bow"></div>
            <div class="gift-lid"></div>
            <div class="gift-body"></div>
        </div>
        <p class="hint">Chị ơi, có món quà nhỏ cho chị này... <br> (Bấm vào hộp quà nhé!)</p>
    </div>

    <div id="auth-screen" class="hidden">
        <div class="auth-box">
            <h3>Nhập mật mã bí mật</h3>
            <p>Gợi ý: Ngày kỷ niệm hoặc tên em viết liền</p>
            <input type="password" id="password-input" placeholder="Mật mã là gì nhỉ?">
            <button onclick="checkUnlock()">Mở Quà Ngay!</button>
            <p id="error-msg" class="hidden">Sai rồi nhé, thử lại xem nào! 😜</p>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <div class="content">
            <img src="https://via.placeholder.com/150" alt="Chị yêu" class="final-pic">
            <h1 class="main-title">HAPPY BIRTHDAY CHỊ YÊU! 🎂</h1>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
